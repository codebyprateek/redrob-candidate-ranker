  No candidate data was fed to any LLM during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-dimensional rule-based ranker with five scoring components: (1) skills
  scoring with proficiency/duration/endorsement weighting, (2) career trajectory
  scoring evaluating product vs services background and ML work in role descriptions,
  (3) behavioral/availability signals from redrob_signals, (4) GitHub + assessment
  proof-points, (5) location fit. Components are combined via weighted sum then
  multiplied by a disqualifier factor that penalizes wrong-domain titles, pure-research
  backgrounds, full-services careers, and CV/speech-primary specialists. Honeypot
  detection identifies profiles with impossible career timelines, expert-in-many-skills
  with zero duration, and title-skill contradictions. No GPU, no external APIs;
  runs in ~90 seconds on 100K candidates CPU-only.

